<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Marks Entry – College Management System</title>
  <meta name="description" content="Enter and update student internal assessment marks." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .marks-header-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    
    .marks-input {
      width: 80px;
      padding: 6px 10px;
      text-align: center;
    }
    
    .remarks-input {
      width: 100%;
      padding: 6px 12px;
    }
    
    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    
    .stat-badge-flat {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .stat-badge-flat strong {
      color: var(--purple);
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <div id="sidebar-placeholder"></div>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title">
        <h1>Internal Assessment Marks</h1>
        <p>Record Test 1, Test 2, Assignment, and attendance marks.</p>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" id="btn-save-marks" onclick="saveMarksBulk()">
          💾 Save & Publish Marks
        </button>
      </div>
    </header>

    <div class="page-content">
      
      <!-- Filtering & Settings Card -->
      <div class="card" style="margin-bottom: 28px;">
        <div class="marks-header-grid">
          
          <div class="form-group" style="margin: 0;">
            <label class="form-label" for="filter-subject">Subject</label>
            <select class="form-control" id="filter-subject" onchange="onFilterChange()">
              <!-- Loaded dynamically -->
            </select>
          </div>
          
          <div class="form-group" style="margin: 0;">
            <label class="form-label" for="filter-exam">Assessment Type</label>
            <select class="form-control" id="filter-exam" onchange="onFilterChange()">
              <option value="Internal 1">Test 1 (Internal 1)</option>
              <option value="Internal 2">Test 2 (Internal 2)</option>
              <option value="Assignment">Assignment</option>
              <option value="Lab">Lab Assessment</option>
            </select>
          </div>
          
          <div class="form-group" style="margin: 0;">
            <label class="form-label" for="input-max-marks">Maximum Marks</label>
            <input class="form-control" type="number" id="input-max-marks" value="50" min="1" max="100" onchange="updateMaxMarks(this.value)" />
          </div>
          
        </div>
      </div>

      <!-- Marks Entry Table Card -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">📝 Student Marks Spreadsheet</h3>
          <div style="display: flex; gap: 8px;">
            <button class="btn btn-outline btn-sm" onclick="fetchMarksData()">🔄 Reload</button>
          </div>
        </div>
        
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Roll Number</th>
                <th>Student Name</th>
                <th>Obtained Marks</th>
                <th>Max Marks</th>
                <th>Remarks</th>
              </tr>
            </thead>
            <tbody id="marks-table-body">
              <tr>
                <td colspan="5" style="text-align: center; color: var(--text-muted);">
                  Please select a subject above to load student records.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <!-- Summary Stats Badges -->
        <div class="stats-row" id="marks-stats-row" style="display: none;">
          <div class="stat-badge-flat">
            <span>Average:</span>
            <strong id="stat-avg">0.0</strong>
          </div>
          <div class="stat-badge-flat">
            <span>Highest Marks:</span>
            <strong id="stat-highest">0</strong>
          </div>
          <div class="stat-badge-flat">
            <span>Lowest Marks:</span>
            <strong id="stat-lowest">0</strong>
          </div>
          <div class="stat-badge-flat">
            <span>Pass Rate:</span>
            <strong id="stat-pass-rate">0%</strong>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/internal_marks.js"></script>
<script>
  // Auth control
  document.addEventListener('DOMContentLoaded', () => {
    const userType = localStorage.getItem('user_type');
    if (userType !== 'staff' && userType !== 'lecturer') {
      window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname);
      return;
    }
    renderDynamicSidebar('nav-internal-marks');
  });

  
function renderDynamicSidebar(activePageId) {
  const userType = localStorage.getItem('user_type');
  const placeholder = document.getElementById('sidebar-placeholder');
  if (!placeholder) return;
  
  if (userType === 'staff') {
    placeholder.outerHTML = `
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">🎓</div>
        <div>
          <div class="brand-name">CampusFlow</div>
          <div class="brand-sub">ArcFace Face Recognition</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <a href="index.html" class="nav-item" id="nav-dashboard">
        <span class="nav-icon">📊</span><span>Dashboard</span>
      </a>
      <div class="nav-section-label">Manage</div>
      <a href="register.html" class="nav-item" id="nav-register">
        <span class="nav-icon">👤</span><span>Register Student</span>
      </a>
      <a href="students.html" class="nav-item" id="nav-students">
        <span class="nav-icon">👥</span><span>View Students</span>
      </a>
      <a href="enroll.html" class="nav-item" id="nav-enroll">
        <span class="nav-icon">🤳</span><span>Enroll Face</span>
      </a>
      <a href="reports.html" class="nav-item" id="nav-reports">
        <span class="nav-icon">📋</span><span>Reports</span>
      </a>
      <div class="nav-section-label">College System</div>
      <a href="lecturer_dashboard.html" class="nav-item" id="nav-lecturer-portal">
        <span class="nav-icon">👩‍🏫</span><span>Lecturer Portal</span>
      </a>
      <a href="attendance.html" class="nav-item" id="nav-take-attendance">
        <span class="nav-icon">📷</span><span>Take Attendance</span>
      </a>
      <a href="qrcodes.html" class="nav-item" id="nav-qr-attendance">
        <span class="nav-icon">📱</span><span>QR Attendance</span>
      </a>
      <a href="internal_marks.html" class="nav-item" id="nav-internal-marks">
        <span class="nav-icon">📝</span><span>Internal Marks</span>
      </a>
      <a href="attendance_report.html" class="nav-item" id="nav-attendance-report">
        <span class="nav-icon">📈</span><span>Attendance Reports</span>
      </a>
      <a href="notifications.html" class="nav-item" id="nav-notifications">
        <span class="nav-icon">🔔</span><span>Notifications</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="status-badge">
        <div class="status-dot"></div>
        <span>Server Online</span>
      </div>
      <button class="btn btn-outline btn-sm" style="width:100%; margin-top:10px;" onclick="logout()">
        🚪 Logout
      </button>
    </div>
  </aside>`;
  } else {
    placeholder.outerHTML = `
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">🏫</div>
        <div>
          <div class="brand-name">CMS Portal</div>
          <div class="brand-sub">Lecturer Console</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main Menu</div>
      <a href="lecturer_dashboard.html" class="nav-item" id="nav-lecturer-dashboard">
        <span class="nav-icon">📊</span>
        <span>Dashboard</span>
      </a>
      <a href="class_session.html" class="nav-item" id="nav-live-session">
        <span class="nav-icon">🎥</span>
        <span>Live Session</span>
      </a>
      <a href="internal_marks.html" class="nav-item" id="nav-internal-marks">
        <span class="nav-icon">📝</span>
        <span>Internal Marks</span>
      </a>
      <a href="attendance_report.html" class="nav-item" id="nav-attendance-report">
        <span class="nav-icon">📈</span>
        <span>Attendance Report</span>
      </a>
      <a href="notifications.html" class="nav-item" id="nav-notifications">
        <span class="nav-icon">🔔</span>
        <span>Notifications</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline btn-sm" onclick="logout()" style="width:100%;">
        🚪 Logout
      </button>
    </div>
  </aside>`;
  }
  
  const activeEl = document.getElementById(activePageId);
  if (activeEl) {
    activeEl.classList.add('active');
  }
}

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }
</script>
</body>
</html>
