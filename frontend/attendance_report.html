<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Reports – College Management System</title>
  <meta name="description" content="View global student attendance percentage report." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .filter-row {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    
    .filter-item {
      flex: 1;
      min-width: 180px;
    }
    
    .status-text-critical {
      color: var(--red);
      font-weight: 800;
      animation: pulse-red 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <div id="sidebar-placeholder"></div>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title">
        <h1>Attendance Reports</h1>
        <p>Monitor student attendance logs, warnings, and averages.</p>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-outline btn-sm" onclick="exportAttendanceReport()">
          📥 Export CSV
        </button>
      </div>
    </header>

    <div class="page-content">
      
      <!-- Stats Summary Card Grid -->
      <div class="stats-grid" style="margin-bottom: 28px;">
        <div class="stat-card purple">
          <div class="stat-icon purple">👥</div>
          <div class="stat-value" id="summary-total-students">0</div>
          <div class="stat-label">Students Monitored</div>
        </div>
        
        <div class="stat-card blue">
          <div class="stat-icon blue">📈</div>
          <div class="stat-value" id="summary-average-attendance">0%</div>
          <div class="stat-label">Average Attendance</div>
        </div>
        
        <div class="stat-card orange">
          <div class="stat-icon orange">⚠️</div>
          <div class="stat-value" id="summary-low-attendance">0</div>
          <div class="stat-label">Below 75% Threshold</div>
        </div>
        
        <div class="stat-card red">
          <div class="stat-icon red">🚨</div>
          <div class="stat-value" id="summary-critical-attendance">0</div>
          <div class="stat-label">Below 50% (Critical)</div>
        </div>
      </div>

      <!-- Search & Filters -->
      <div class="card" style="margin-bottom: 28px;">
        <div class="filter-row">
          <div class="filter-item">
            <label class="form-label" for="filter-dept">Department</label>
            <select class="form-control" id="filter-dept" onchange="onFilterChange()">
              <option value="All">All Departments</option>
              <option>Computer Science</option>
              <option>CSE - AIML</option>
              <option>Electronics Engineering</option>
              <option>Mechanical Engineering</option>
              <option>Civil Engineering</option>
            </select>
          </div>
          
          <div class="filter-item">
            <label class="form-label" for="filter-range">Attendance Range</label>
            <select class="form-control" id="filter-range" onchange="onFilterChange()">
              <option value="all">Show All Students</option>
              <option value="good">Good (>= 75%)</option>
              <option value="warning">Warning (50% - 75%)</option>
              <option value="critical">Critical (< 50%)</option>
            </select>
          </div>
          
          <div class="filter-item" style="flex: 1.5;">
            <label class="form-label" for="search-input">Search Student</label>
            <input class="form-control" type="text" id="search-input" placeholder="🔍 Search by name or roll number..." oninput="onFilterChange()" />
          </div>
        </div>
      </div>

      <!-- Student Attendance Table Card -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">📋 Student Attendance Overview</h3>
        </div>
        
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Roll Number</th>
                <th>Name</th>
                <th>Department</th>
                <th>Attended Classes</th>
                <th>Total Classes</th>
                <th>Percentage</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="report-table-body">
              <!-- Loaded dynamically -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/attendance_report.js"></script>
<script>
  // Auth control
  document.addEventListener('DOMContentLoaded', () => {
    const userType = localStorage.getItem('user_type');
    if (userType !== 'staff' && userType !== 'lecturer') {
      window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname);
      return;
    }
    renderDynamicSidebar('nav-attendance-report');
  });

  
function renderDynamicSidebar(activePageId) {
  const userType = localStorage.getItem('user_type');
  const placeholder = document.getElementById('sidebar-placeholder');
  if (!placeholder) return;
  
  if (userType === 'staff') {
    placeholder.outerHTML = `
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">🎓</div>
        <div>
          <div class="brand-name">CampusFlow</div>
          <div class="brand-sub">ArcFace Face Recognition</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <a href="index.html" class="nav-item" id="nav-dashboard">
        <span class="nav-icon">📊</span><span>Dashboard</span>
      </a>
      <div class="nav-section-label">Manage</div>
      <a href="register.html" class="nav-item" id="nav-register">
        <span class="nav-icon">👤</span><span>Register Student</span>
      </a>
      <a href="students.html" class="nav-item" id="nav-students">
        <span class="nav-icon">👥</span><span>View Students</span>
      </a>
      <a href="enroll.html" class="nav-item" id="nav-enroll">
        <span class="nav-icon">🤳</span><span>Enroll Face</span>
      </a>
      <a href="reports.html" class="nav-item" id="nav-reports">
        <span class="nav-icon">📋</span><span>Reports</span>
      </a>
      <div class="nav-section-label">College System</div>
      <a href="index.html" class="nav-item" id="nav-lecturer-portal">
        <span class="nav-icon">👩‍🏫</span><span>Lecturer Portal</span>
      </a>
      <a href="attendance.html" class="nav-item" id="nav-take-attendance">
        <span class="nav-icon">📷</span><span>Take Attendance</span>
      </a>
      <a href="qrcodes.html" class="nav-item" id="nav-qr-attendance">
        <span class="nav-icon">📱</span><span>QR Attendance</span>
      </a>
      <a href="internal_marks.html" class="nav-item" id="nav-internal-marks">
        <span class="nav-icon">📝</span><span>Internal Marks</span>
      </a>
      <a href="attendance_report.html" class="nav-item" id="nav-attendance-report">
        <span class="nav-icon">📈</span><span>Attendance Reports</span>
      </a>
      <a href="notifications.html" class="nav-item" id="nav-notifications">
        <span class="nav-icon">🔔</span><span>Notifications</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="status-badge">
        <div class="status-dot"></div>
        <span>Server Online</span>
      </div>
      <button class="btn btn-outline btn-sm" style="width:100%; margin-top:10px;" onclick="logout()">
        🚪 Logout
      </button>
    </div>
  </aside>`;
  } else {
    placeholder.outerHTML = `
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">🏫</div>
        <div>
          <div class="brand-name">CMS Portal</div>
          <div class="brand-sub">Lecturer Console</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main Menu</div>
      <a href="index.html" class="nav-item" id="nav-lecturer-dashboard">
        <span class="nav-icon">📊</span>
        <span>Dashboard</span>
      </a>
      <a href="class_session.html" class="nav-item" id="nav-live-session">
        <span class="nav-icon">🎥</span>
        <span>Live Session</span>
      </a>
      <a href="internal_marks.html" class="nav-item" id="nav-internal-marks">
        <span class="nav-icon">📝</span>
        <span>Internal Marks</span>
      </a>
      <a href="attendance_report.html" class="nav-item" id="nav-attendance-report">
        <span class="nav-icon">📈</span>
        <span>Attendance Report</span>
      </a>
      <a href="notifications.html" class="nav-item" id="nav-notifications">
        <span class="nav-icon">🔔</span>
        <span>Notifications</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline btn-sm" onclick="logout()" style="width:100%;">
        🚪 Logout
      </button>
    </div>
  </aside>`;
  }
  
  const activeEl = document.getElementById(activePageId);
  if (activeEl) {
    activeEl.classList.add('active');
  }
}

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }
</script>
</body>
</html>
